[config]
image_directory = 'img'
thumbnail_size = 400 # longest side will never exceede 400 pixels..
thumbnail_quality = 60 # jpg quality option
new_images_timeframe = 604800 # = 60*60*24*7 = one week in seconds (unix epoch time)

[about]
name = 'Emil Bratt Børsting'
image = '2026_02_02__22_18_47__78.jpg'
bio = """
Jeg fotograferer alt mulig. Foto er kjempegøy!

Bildene du finner her er tilgjengelige for nedlasting.
Ønsker du å ha bilder på veggen, som bakgrunnsbilde eller bare lagre det på din enhet,
da trykker du på "Last Ned" knappen under bildet.
Det er helt gratis for deg som privatperson.
Om du fant bilder du likte og har likevel lyst til å støtte meg, så kan dette gjøres via vipps til 976 76 160.
Det vil komme flere bilder med tiden, så følg med. :):)

Jeg brukte facebook og instagram mye før, men de har gjort det vanskelig for brukere som ikke har konto der.
Gammel instagram-konto finner du her: '<a href="https://www.instagram.com/borstingphotography/">Borsting Photography</a>'

Tok til slutt hammern fatt og snekra sammen min egen nettside hvor jeg har full kontroll.
Alle har tilgang til bildene (ingen registrering),
bildene bevares i full kavalitet (ingen komprimering)
og det er ingen pop-up banner (ingen personlig data lagres).

Er du kanskje en utvikler selv og vil se koden til nettsida? Her ligger
<button><a href="https://github.com/emilbratt/frifoto.emilbratt.no/">kildekode!</a></button>
"""

